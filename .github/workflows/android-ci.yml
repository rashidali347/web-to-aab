name: Quick Android Build

on:
  push:
    branches: [ "main" ] # Runs every time you push to the main branch
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle & Build
        uses: gradle/actions/setup-gradle@v3
        with:
          # This automatically makes gradlew executable and caches files
          arguments: assembleDebug 

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: trustrium-app-debug
          path: app/build/outputs/apk/debug/*.apk
